services:
  docker-socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: bw-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:2375:2375"
    environment:
      # Read-only: block all POST/PUT/DELETE
      POST: 0
      PUT: 0
      DELETE: 0
      # Allow read access to these endpoints
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      # Block everything else
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      EXEC: 0
      SECRETS: 0
      SERVICES: 0
      TASKS: 0
      SWARM: 0
      NODES: 0
      PLUGINS: 0
      SYSTEM: 0
      DISTRIBUTION: 0
